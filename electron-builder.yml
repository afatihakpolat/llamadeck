appId: com.llamadeck.app
productName: LlamaDeck
directories:
  buildResources: build
files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - assets/icon.png
  - assets/icon_256.png
  - resources/commands/overlay.json
  - resources/commands/b9202.json
extraResources:
  - from: resources/cli
    to: cli
  - from: resources/skills
    to: skills
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icon_256.png
nsis:
  artifactName: LlamaDeck-Setup-${version}.${ext}
  include: resources/installer.nsh
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false
mac:
  target: dmg
  icon: assets/icon_256.png
linux:
  target: AppImage
  icon: assets/icon_256.png
publish:
  provider: github
  owner: afatihakpolat
  repo: llamadeck
