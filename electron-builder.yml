appId: com.llamadeck.app
productName: LlamaDeck
directories:
  buildResources: build
files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - assets/icon.png
  - assets/icon_256.png
  - resources/commands/overlay.json
  - resources/commands/b9202.json
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icon_256.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target: dmg
  icon: assets/icon_256.png
linux:
  target: AppImage
  icon: assets/icon_256.png
